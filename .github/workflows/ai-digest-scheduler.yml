name: 🤖 AI Digest Enzo - Daily Scheduler

on:
  schedule:
    # 5 AM UTC (ajusta según tu zona horaria)
    - cron: '0 5 * * *'
    # 5 PM UTC (ajusta según tu zona horaria)
    - cron: '0 17 * * *'
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate and send AI Digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 ai_digest_telegram.py

      - name: Log success
        if: success()
        run: |
          echo "✅ AI Digest sent successfully at $(date)"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Log failure
        if: failure()
        run: |
          echo "❌ Failed to send AI Digest"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
